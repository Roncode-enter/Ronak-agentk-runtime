# =============================================================================
# Edge Swarm — Lightweight multi-agent coordination for k3s / edge nodes
# =============================================================================
# This example deploys a 2-agent swarm optimized for edge environments:
#   - Minimal memory: 128Mi per agent (vs 512Mi+ default)
#   - Lightweight model: gemini-2.0-flash-lite (cheapest, fastest)
#   - Chain strategy: request flows from triage → responder sequentially
#   - Low timeout: 30 seconds (edge networks can be slow)
#
# Deploy with edge profile:
#   kustomize build config/edge | kubectl apply -f -
#   kubectl apply -f examples/edge-swarm.yaml
# =============================================================================

# Agent 1: Edge Triage — classifies incoming requests
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: Agent
metadata:
  name: edge-triage
  labels:
    profile: edge
spec:
  framework: google-adk
  description: "Edge triage agent that classifies incoming requests"
  instruction: "You are a lightweight triage agent running on an edge node. Quickly classify incoming requests as: urgent, normal, or low-priority. Be very concise — edge bandwidth is limited."
  model: "gemini/gemini-2.0-flash-lite"
  protocols:
    - type: A2A
  replicas: 1
  env:
    - name: GEMINI_API_KEY
      value: "your-api-key-here"
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"
  costBudget:
    maxMonthlyCostUSD: "10.00"
    costPerTokenUSD: "0.000005"

---

# Agent 2: Edge Responder — handles classified requests
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: Agent
metadata:
  name: edge-responder
  labels:
    profile: edge
spec:
  framework: google-adk
  description: "Edge responder that handles classified requests"
  instruction: "You are a responder agent on an edge node. You receive pre-classified requests from the triage agent. Handle them efficiently with minimal token usage. Keep responses under 200 words."
  model: "gemini/gemini-2.0-flash-lite"
  protocols:
    - type: A2A
  replicas: 1
  env:
    - name: GEMINI_API_KEY
      value: "your-api-key-here"
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "200m"
  costBudget:
    maxMonthlyCostUSD: "10.00"
    costPerTokenUSD: "0.000005"

---

# Swarm: Chain strategy — triage → responder (sequential pipeline)
apiVersion: runtime.agentic-layer.ai/v1alpha1
kind: Swarm
metadata:
  name: edge-swarm
  labels:
    profile: edge
spec:
  strategy: chain
  timeoutSeconds: 30
  replicas: 1
  agents:
    - name: triage
      agentRef:
        name: edge-triage
      role: leader
    - name: responder
      agentRef:
        name: edge-responder
      role: worker

# After applying, verify:
#   kubectl get swarm edge-swarm
#     STRATEGY   READY   TOTAL
#     chain      2       2
#
#   kubectl get agents -l profile=edge
#     NAME              FRAMEWORK    READY   REPLICAS
#     edge-triage       google-adk   True    1
#     edge-responder    google-adk   True    1
#
# Total edge footprint: ~256Mi memory for 2 agents + 1 coordinator
# Compare: default agents use 512Mi+ each = 1.5Gi+ for same setup
