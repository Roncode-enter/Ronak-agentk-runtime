---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: swarms.runtime.agentic-layer.ai
spec:
  group: runtime.agentic-layer.ai
  names:
    kind: Swarm
    listKind: SwarmList
    plural: swarms
    singular: swarm
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.strategy
      name: Strategy
      type: string
    - jsonPath: .status.readyAgents
      name: Ready
      type: integer
    - jsonPath: .status.totalAgents
      name: Total
      type: integer
    - jsonPath: .status.coordinatorUrl
      name: Coordinator URL
      priority: 1
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Swarm is the Schema for the swarms API.
          A Swarm defines active multi-agent coordination — it deploys a coordinator pod
          that routes A2A requests between participating agents using a defined strategy.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SwarmSpec defines the desired state of Swarm.
            properties:
              agents:
                description: |-
                  Agents defines the agents participating in this swarm.
                  At least 2 agents are required for meaningful coordination.
                items:
                  description: SwarmAgent represents an agent participating in a Swarm.
                  properties:
                    agentRef:
                      description: |-
                        AgentRef references an Agent resource in the cluster.
                        When specified, the operator will resolve the Agent's service URL automatically.
                        Only Name and Namespace fields are used; other fields are ignored.
                        If Namespace is not specified, defaults to the same namespace as the Swarm.
                        Mutually exclusive with Url - exactly one must be specified.
                      properties:
                        apiVersion:
                          description: API version of the referent.
                          type: string
                        fieldPath:
                          description: |-
                            If referring to a piece of an object instead of an entire object, this string
                            should contain a valid JSON/Go field access statement, such as desiredState.manifest.containers[2].
                            For example, if the object reference is to a container within a pod, this would take on a value like:
                            "spec.containers{name}" (where "name" refers to the name of the container that triggered
                            the event) or if no container name is specified "spec.containers[2]" (container with
                            index 2 in this pod). This syntax is chosen only to have some well-defined way of
                            referencing a part of an object.
                          type: string
                        kind:
                          description: |-
                            Kind of the referent.
                            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                          type: string
                        name:
                          description: |-
                            Name of the referent.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                          type: string
                        namespace:
                          description: |-
                            Namespace of the referent.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/
                          type: string
                        resourceVersion:
                          description: |-
                            Specific resourceVersion to which this reference is made, if any.
                            More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
                          type: string
                        uid:
                          description: |-
                            UID of the referent.
                            More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#uids
                          type: string
                      type: object
                      x-kubernetes-map-type: atomic
                    name:
                      description: Name is a unique identifier for this agent within
                        the swarm.
                      minLength: 1
                      type: string
                    role:
                      description: |-
                        Role defines this agent's role in the swarm coordination.
                        Only meaningful for leader-follower and chain strategies.
                      enum:
                      - leader
                      - worker
                      - aggregator
                      type: string
                    url:
                      description: |-
                        Url is the HTTP/HTTPS endpoint URL for a remote agent outside the cluster.
                        It refers to the agent's well-known agent card URL.
                        Mutually exclusive with AgentRef - exactly one must be specified.
                      format: uri
                      type: string
                  required:
                  - name
                  type: object
                minItems: 2
                type: array
              commonMetadata:
                description: |-
                  CommonMetadata defines labels and annotations to be applied to resources
                  created for this swarm (Deployment, Service, ConfigMap).
                properties:
                  annotations:
                    additionalProperties:
                      type: string
                    description: Annotations is a map of key/value pairs to be applied
                      to the resource.
                    type: object
                  labels:
                    additionalProperties:
                      type: string
                    description: Labels is a map of key/value pairs to be applied
                      to the resource.
                    type: object
                type: object
              coordinatorPort:
                default: 8080
                description: CoordinatorPort is the port the coordinator service listens
                  on.
                format: int32
                maximum: 65535
                minimum: 1
                type: integer
              maxConcurrency:
                description: |-
                  MaxConcurrency is the maximum number of parallel agent calls for fan-out strategy.
                  Only used when strategy is "fan-out". Defaults to the number of agents.
                format: int32
                minimum: 1
                type: integer
              replicas:
                description: Replicas is the number of coordinator pod replicas.
                format: int32
                minimum: 0
                type: integer
              strategy:
                description: Strategy defines how agents in this swarm coordinate
                  with each other.
                enum:
                - round-robin
                - fan-out
                - chain
                - leader-follower
                type: string
              timeoutSeconds:
                default: 60
                description: TimeoutSeconds is the per-agent call timeout in seconds.
                format: int32
                maximum: 300
                minimum: 1
                type: integer
            required:
            - agents
            - strategy
            type: object
          status:
            description: SwarmStatus defines the observed state of Swarm.
            properties:
              conditions:
                description: Conditions represent the latest available observations
                  of the swarm's state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              coordinatorUrl:
                description: |-
                  CoordinatorUrl is the cluster-local URL of the coordinator service.
                  Format: http://{name}-coordinator.{namespace}.svc.cluster.local:{port}
                type: string
              readyAgents:
                description: ReadyAgents is the number of agents that are reachable
                  and have a valid URL.
                format: int32
                type: integer
              strategy:
                description: Strategy echoes the active coordination strategy from
                  the spec.
                type: string
              totalAgents:
                description: TotalAgents is the total number of agents defined in
                  the swarm.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
