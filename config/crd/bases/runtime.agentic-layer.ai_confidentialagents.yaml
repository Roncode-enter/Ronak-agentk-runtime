                      For example, if the object reference is to a container within a pod, this would take on a value like:
                      "spec.containers{name}" (where "name" refers to the name of the container that triggered
                      the event) or if no container name is specified "spec.containers[2]" (container with
                      index 2 in this pod). This syntax is chosen only to have some well-defined way of
                      referencing a part of an object.
                    type: string
                  kind:
                    description: |-
                      Kind of the referent.
                      More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                    type: string
                  name:
                    description: |-
                      Name of the referent.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                  namespace:
                    description: |-
                      Namespace of the referent.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/
                    type: string
                  resourceVersion:
                    description: |-
                      Specific resourceVersion to which this reference is made, if any.
                      More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
                    type: string
                  uid:
                    description: |-
                      UID of the referent.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#uids
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              attestationEndpoint:
                description: |-
                  AttestationEndpoint is the URL for remote attestation verification.
                  When set, the attestation sidecar periodically reports to this endpoint.
                format: uri
                type: string
              attestationIntervalSeconds:
                default: 300
                description: AttestationIntervalSeconds is how often the attestation
                  sidecar generates a fresh report.
                format: int32
                maximum: 3600
                minimum: 30
                type: integer
              enclaveMemoryMB:
                default: 256
                description: EnclaveMemoryMB is the memory allocated to the TEE enclave
                  in megabytes.
                format: int32
                maximum: 16384
                minimum: 64
                type: integer
              memoryEncryption:
                default: true
                description: MemoryEncryption enables hardware memory encryption for
                  the agent pod.
                type: boolean
              runtimeClassName:
                default: kata-cc
                description: RuntimeClassName is the Kubernetes RuntimeClass to use
                  for TEE pods.
                type: string
              teeProvider:
                description: TEEProvider specifies the hardware TEE provider for confidential
                  execution.
                enum:
