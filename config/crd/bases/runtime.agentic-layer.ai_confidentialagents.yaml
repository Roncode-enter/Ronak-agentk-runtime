    listKind: ConfidentialAgentList
    plural: confidentialagents
    singular: confidentialagent
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.teeProvider
      name: TEE Provider
      type: string
    - jsonPath: .status.verified
      name: Verified
      type: boolean
