              deploymentName:
                description: DeploymentName is the name of the TEE-enabled Deployment
                  created for this ConfidentialAgent.
                type: string
              lastAttestationTime:
                description: LastAttestationTime is the timestamp of the most recent
                  attestation report.
                format: date-time
                type: string
              teeProvider:
                description: TEEProvider echoes the active TEE provider from the spec.
                type: string
              verified:
                description: Verified indicates whether the latest attestation was
                  successful.
