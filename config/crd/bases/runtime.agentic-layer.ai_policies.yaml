kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  name: policies.runtime.agentic-layer.ai
spec:
  group: runtime.agentic-layer.ai
  names:
    kind: Policy
    listKind: PolicyList
    plural: policies
    singular: policy
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.type
      name: Type
      type: string
    - jsonPath: .spec.enforcement
      name: Enforcement
      type: string
    - jsonPath: .status.ruleCount
      name: Rules
      type: integer
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          Policy is the Schema for the policies API.
          It defines security and cost policies enforced via eBPF and OPA.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: PolicySpec defines the desired state of Policy.
            properties:
              description:
                description: Description provides a human-readable description of
                  the policy's purpose.
                type: string
              enforcement:
                default: enforcing
                description: Enforcement defines whether the policy actively blocks
                  or only observes.
                enum:
                - enforcing
                - permissive
                type: string
              rules:
                description: Rules defines the individual policy rules.
                items:
                  description: PolicyRule defines a single rule within a policy.
                  properties:
                    action:
                      default: block
                      description: Action defines what happens when this rule matches.
                      enum:
                      - block
                      - audit
                      - alert
                      type: string
                    ebpf:
                      description: EBPF holds configuration when this is an eBPF-based
                        rule.
                      properties:
                        allowedCIDRs:
                          description: |-
                            AllowedCIDRs lists network ranges the agent is allowed to reach.
                            Only applicable for network-egress programs.
                          items:
                            type: string
                          type: array
                        deniedPorts:
                          description: |-
                            DeniedPorts lists TCP/UDP ports the agent is blocked from reaching.
                            Only applicable for network-egress programs.
                          items:
                            format: int32
                            type: integer
                          type: array
                        deniedSyscalls:
                          description: |-
                            DeniedSyscalls lists system calls the agent container is blocked from making.
                            Only applicable for syscall-filter programs.
                          items:
                            type: string
                          type: array
                        program:
                          description: Program identifies the type of eBPF program
                            to attach.
                          enum:
                          - network-egress
                          - syscall-filter
                          - file-access
                          type: string
                      required:
                      - program
                      type: object
                    name:
                      description: Name is a human-readable identifier for this rule.
                      minLength: 1
                      type: string
                    opa:
                      description: OPA holds configuration when this is an OPA-based
                        rule.
                      properties:
                        dataConfigMapRef:
                          description: DataConfigMapRef references a ConfigMap containing
                            data for the OPA policy.
                          properties:
                            apiVersion:
                              description: API version of the referent.
                              type: string
                            fieldPath:
                              description: |-
                                If referring to a piece of an object instead of an entire object, this string
                                should contain a valid JSON/Go field access statement, such as desiredState.manifest.containers[2].
                                For example, if the object reference is to a container within a pod, this would take on a value like:
                                "spec.containers{name}" (where "name" refers to the name of the container that triggered
                                the event) or if no container name is specified "spec.containers[2]" (container with
                                index 2 in this pod). This syntax is chosen only to have some well-defined way of
                                referencing a part of an object.
                              type: string
                            kind:
                              description: |-
                                Kind of the referent.
                                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                              type: string
                            name:
                              description: |-
                                Name of the referent.
                                More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                              type: string
                            namespace:
                              description: |-
                                Namespace of the referent.
                                More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/
                              type: string
                            resourceVersion:
                              description: |-
                                Specific resourceVersion to which this reference is made, if any.
                                More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
                              type: string
                            uid:
                              description: |-
                                UID of the referent.
                                More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#uids
                              type: string
                          type: object
                          x-kubernetes-map-type: atomic
                        rego:
                          description: Rego is the inline Rego policy code.
                          minLength: 1
                          type: string
                      required:
                      - rego
                      type: object
                  required:
                  - name
                  type: object
                minItems: 1
                type: array
              targetRef:
                description: |-
                  TargetRef references the Agent or ToolServer this policy applies to.
                  If Namespace is not specified, defaults to the same namespace as the Policy.
                properties:
                  apiVersion:
                    description: API version of the referent.
                    type: string
                  fieldPath:
                    description: |-
                      If referring to a piece of an object instead of an entire object, this string
                      should contain a valid JSON/Go field access statement, such as desiredState.manifest.containers[2].
                      For example, if the object reference is to a container within a pod, this would take on a value like:
                      "spec.containers{name}" (where "name" refers to the name of the container that triggered
                      the event) or if no container name is specified "spec.containers[2]" (container with
                      index 2 in this pod). This syntax is chosen only to have some well-defined way of
                      referencing a part of an object.
                    type: string
                  kind:
                    description: |-
                      Kind of the referent.
                      More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
                    type: string
                  name:
                    description: |-
                      Name of the referent.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#names
                    type: string
                  namespace:
                    description: |-
                      Namespace of the referent.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/namespaces/
                    type: string
                  resourceVersion:
                    description: |-
                      Specific resourceVersion to which this reference is made, if any.
                      More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#concurrency-control-and-consistency
                    type: string
                  uid:
                    description: |-
                      UID of the referent.
                      More info: https://kubernetes.io/docs/concepts/overview/working-with-objects/names/#uids
                    type: string
                type: object
                x-kubernetes-map-type: atomic
              type:
                description: 'Type specifies the enforcement engine: eBPF, OPA, or
                  hybrid (both).'
                enum:
                - ebpf
                - opa
                - hybrid
                type: string
            required:
            - rules
            - type
            type: object
          status:
            description: PolicyStatus defines the observed state of Policy.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              enforced:
                description: Enforced indicates whether the policy is currently being
                  enforced.
                type: boolean
              ruleCount:
                description: RuleCount is the number of rules in this policy.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
