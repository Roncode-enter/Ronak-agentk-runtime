apiVersion: apps/v1
kind: Deployment
metadata:
  name: attestation-service
  namespace: agent-runtime-operator-system
  labels:
    app: attestation-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: attestation-service
  template:
    metadata:
      labels:
        app: attestation-service
    spec:
      containers:
        - name: attestation-service
          image: attestation-service:dev
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9090
              name: attestation
              protocol: TCP
          env:
            - name: TEE_PROVIDER
              value: "software-attestation"
            - name: PORT
              value: "9090"
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 2
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 64Mi
          securityContext:
            runAsNonRoot: false
            readOnlyRootFilesystem: true
---
apiVersion: v1
kind: Service
metadata:
  name: attestation-service
  namespace: agent-runtime-operator-system
  labels:
    app: attestation-service
spec:
  selector:
    app: attestation-service
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: attestation
  type: ClusterIP
